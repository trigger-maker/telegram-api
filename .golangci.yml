version: "2"

linters:
  enable:
    - gocyclo
    - govet
    - staticcheck
    - errcheck
    - unused
    - gocritic
    - revive
    - dupl
    - goconst
    - misspell
    - lll
    - funlen
    - gocognit
    - godot
    - gosec

  settings:
    gocyclo:
      min-complexity: 15

    govet:
      enable:
        - atomic
        - bools
        - composites
        - copylocks
        - nilfunc
        - printf
        - stdmethods
        - structtag
        - unmarshal

    errcheck:
      check-type-assertions: false
      check-blank: false

    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning

    dupl:
      threshold: 150

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    lll:
      line-length: 140
      tab-width: 1

    funlen:
      lines: 100
      statements: 50

    gocognit:
      min-complexity: 25

    godot:
      scope: declarations
      capital: false

    gosec:
      excludes:
        - G104

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  go: "1.24"
  tests: true
  modules-download-mode: readonly
